name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Pre-Clean Conflicting Configurations
        run: |
          rm -rf capacitor.config.ts capacitor.config.json

      - name: Unzip Project Files
        run: |
          unzip "pos.zip--صيدلي-برو" -d temp_unzip || unzip *.zip -d temp_unzip || true
          TARGET_DIR=$(find temp_unzip -name "package.json" -exec dirname {} \;)
          if [ -n "$TARGET_DIR" ]; then
            echo "Found project files in: $TARGET_DIR"
            cp -r "$TARGET_DIR"/* .
          else
            echo "Error: package.json not found!"
            exit 1
          fi
          rm -rf temp_unzip

      - name: Auto-Patch React Code for Share & Bluetooth Classic (via Node)
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          function findTargetFiles(dir, words, foundFiles = []) {
            const files = fs.readdirSync(dir);
            for (const file of files) {
              const fullPath = path.join(dir, file);
              const stat = fs.statSync(fullPath);
              if (stat.isDirectory()) {
                findTargetFiles(fullPath, words, foundFiles);
              } else if (stat.isFile() && /\.(js|jsx|ts|tsx)$/.test(file)) {
                const content = fs.readFileSync(fullPath, 'utf8');
                if (words.some(word => content.includes(word))) {
                  foundFiles.push(fullPath);
                }
              }
            }
            return foundFiles;
          }

          // 1. معالجة وتعديل ملف مشاركة النسخ الاحتياطية (SettingsScreen)
          const shareFiles = findTargetFiles('src', ['تم تصدير', 'تصدير ومشاركة', 'download']);
          if (shareFiles.length > 0) {
            const targetFile = shareFiles[0];
            console.log('Found Share Target File:', targetFile);
            let content = fs.readFileSync(targetFile, 'utf8');

            const imports = 'import { Filesystem, Directory } from \"@capacitor/filesystem\";\nimport { Share } from \"@capacitor/share\";\nimport { Capacitor } from \"@capacitor/core\";\n';
            content = imports + content;

            const patchCode = [
              '',
              'window.handleCapacitorShare = async (blobOrUrl, fallbackFileName) => {',
              '  try {',
              '    const fileName = fallbackFileName || (\"Saydali_Pro_Backup_\" + Date.now() + \".zip\");',
              '    let base64Data = \"\";',
              '    if (typeof blobOrUrl === \"string\" && blobOrUrl.startsWith(\"data:\")) {',
              '      base64Data = blobOrUrl.split(\",\")[1];',
              '    } else {',
              '      const response = await fetch(blobOrUrl);',
              '      const blob = await response.blob();',
              '      base64Data = await new Promise((resolve) => {',
              '        const reader = new FileReader();',
              '        reader.onloadend = () => resolve(reader.result.split(\",\")[1]);',
              '        reader.readAsDataURL(blob);',
              '      });',
              '    }',
              '    if (Capacitor.isNativePlatform()) {',
              '      await Filesystem.requestPermissions();',
              '      const tempFile = await Filesystem.writeFile({',
              '        path: fileName,',
              '        data: base64Data,',
              '        directory: Directory.Cache',
              '      });',
              '      const canShare = await Share.canShare();',
              '      if (canShare.value) {',
              '        await Share.share({',
              '          title: \"نسخة احتياطية - صيدلي برو\",',
              '          text: \"ملف النسخة الاحتياطية لقاعدة البيانات.\",',
              '          url: tempFile.uri,',
              '          dialogTitle: \"تصدير ومشاركة النسخة الاحتياطية\"',
              '        });',
              '      } else {',
              '        await Filesystem.writeFile({',
              '          path: fileName,',
              '          data: base64Data,',
              '          directory: Directory.Documents',
              '        });',
              '        alert(\"تم حفظ الملف في مجلد المستندات Documents بنجاح!\");',
              '      }',
              '    } else {',
              '      const link = document.createElement(\"a\");',
              '      link.href = \"data:application/zip;base64,\" + base64Data;',
              '      link.download = fileName;',
              '      document.body.appendChild(link);',
              '      link.click();',
              '      document.body.removeChild(link);',
              '    }',
              '  } catch (e) {',
              '    console.error(\"فشلت عملية المشاركة البرمجية:\", e);',
              '  }',
              '};'
            ].join('\n');

            content = content + '\n' + patchCode;
            content = content.replace(/([a-zA-Z0-9_]*)\.click\(\)/g, (match, p1) => {
              return 'if (window.handleCapacitorShare) { window.handleCapacitorShare(' + p1 + '.href || ' + p1 + ', \"Saydali_Pro_Backup.zip\"); } else { ' + match + ' }';
            });

            fs.writeFileSync(targetFile, content, 'utf8');
            console.log('React Share Code successfully patched!');
          }

          // 2. حقن مشغّل البلوتوث الكلاسيكي الذكي مع فحص الصلاحيات البرمجية لمنع الكراش
          const mainPath = 'src/main.tsx';
          if (fs.existsSync(mainPath)) {
            console.log('Injecting Bluetooth Classic polyfill into main.tsx...');
            let mainContent = fs.readFileSync(mainPath, 'utf8');

            const polyfillLines = [
              'import { Capacitor } from \"@capacitor/core\";',
              '',
              'if (Capacitor.isNativePlatform()) {',
              '  if (!navigator.bluetooth) {',
              '    // @ts-ignore',
              '    navigator.bluetooth = {};',
              '  }',
              '  ',
              '  // @ts-ignore',
              '  navigator.bluetooth.requestDevice = async function(options) {',
              '    return new Promise((resolve, reject) => {',
              '      const win = window as any;',
              '      if (!win.bluetoothSerial) {',
              '        return reject(new Error(\"إضافة البلوتوث الكلاسيكي غير متوفرة!\"));',
              '      }',
              '      ',
              '      // دالة لتنفيذ عملية البحث الفعلي عن الأجهزة بعد الاطمئنان على الصلاحيات',
              '      const startScan = () => {',
              '        win.bluetoothSerial.discoverUnpaired(function(devices: any[]) {',
              '          if (devices.length === 0) {',
              '            win.bluetoothSerial.list(function(pairedDevices: any[]) {',
              '              showDeviceSelection(pairedDevices, resolve, reject);',
              '            }, reject);',
              '          } else {',
              '            showDeviceSelection(devices, resolve, reject);',
              '          }',
              '        }, function(err: any) {',
              '           win.bluetoothSerial.list(function(pairedDevices: any[]) {',
              '             showDeviceSelection(pairedDevices, resolve, reject);',
              '           }, reject);',
              '        });',
              '      };',
              '      ',
              '      // فحص وطلب الأذونات برمجياً قبل البدء بالمسح لتجنب الخروج المفاجئ (Crash)',
              '      if (win.Capacitor && win.Capacitor.Plugins && win.Capacitor.Plugins.Permissions) {',
              '        win.Capacitor.Plugins.Permissions.query({ name: \"bluetooth\" }).then((status: any) => {',
              '          if (status.state === \"granted\") {',
              '            startScan();',
              '          } else {',
              '            win.Capacitor.Plugins.Permissions.request({ name: \"bluetooth\" }).then((newStatus: any) => {',
              '              if (newStatus.state === \"granted\") {',
              '                startScan();',
              '              } else {',
              '                alert(\"يجب السماح بالوصول إلى البلوتوث للاقتران بالطابعة!\");',
              '                reject(new Error(\"Permission denied\"));',
              '              }',
              '            });',
              '          }',
              '        }).catch(() => {',
              '          // في حال فشل الاستعلام التلقائي، ننفذ مباشرة كخيار بديل لتفادي التوقف',
              '          startScan();',
              '        });',
              '      } else {',
              '        startScan();',
              '      }',
              '    });',
              '  };',
              '}',
              '',
              'function showDeviceSelection(devices: any[], resolve: any, reject: any) {',
              '  if (devices.length === 0) {',
              '    alert(\"لم يتم العثور على أي طابعة بلوتوث قريبة! تأكد من تشغيل الطابعة واقترانها بالهاتف مسبقاً.\");',
              '    return reject(new Error(\"No devices found\"));',
              '  }',
              '  ',
              '  const newlineChar = String.fromCharCode(10);',
              '  const deviceList = devices.map(function(d, index) {',
              '    const name = d.name || \"طابعة مجهولة\";',
              '    const addr = d.address || d.id || \"\";',
              '    return (index + 1) + \". \" + name + \" (\" + addr + \")\";',
              '  }).join(newlineChar);',
              '  ',
              '  const selection = prompt(\"الرجاء إدخال رقم الطابعة التي ترغب بالاتصال بها:\" + newlineChar + newlineChar + deviceList, \"1\");',
              '  ',
              '  if (selection === null) {',
              '    return reject(new Error(\"User cancelled selection\"));',
              '  }',
              '  ',
              '  const selectedIndex = parseInt(selection) - 1;',
              '  if (isNaN(selectedIndex) || selectedIndex < 0 || selectedIndex >= devices.length) {',
              '    alert(\"اختيار غير صحيح!\");',
              '    return reject(new Error(\"Invalid selection\"));',
              '  }',
              '  ',
              '  const device = devices[selectedIndex];',
              '  const deviceAddress = device.address || device.id;',
              '  ',
              '  resolve({',
              '    id: deviceAddress,',
              '    name: device.name || \"طابعة بلوتوث\",',
              '    gatt: {',
              '      connected: false,',
              '      connect: async function() {',
              '        return new Promise((resGatt, rejGatt) => {',
              '          const win = window as any;',
              '          win.bluetoothSerial.connect(deviceAddress, function() {',
              '            this.connected = true;',
              '            resGatt({',
              '              getPrimaryService: async function(serviceUuid: string) {',
              '                return {',
              '                  getCharacteristic: async function(charUuid: string) {',
              '                    return {',
              '                      writeValue: async function(value: any) {',
              '                        return new Promise((resWrite, rejWrite) => {',
              '                          let dataToSend = value;',
              '                          if (value instanceof ArrayBuffer || value.buffer) {',
              '                            dataToSend = new Uint8Array(value.buffer || value);',
              '                          }',
              '                          win.bluetoothSerial.write(dataToSend, resWrite, rejWrite);',
              '                        });',
              '                      }',
              '                    };',
              '                  }',
              '                };',
              '              }',
              '            });',
              '          }, rejGatt);',
              '        });',
              '      },',
              '      disconnect: async function() {',
              '        return new Promise((resDisc) => {',
              '          const win = window as any;',
              '          win.bluetoothSerial.disconnect(resDisc, resDisc);',
              '          this.connected = false;',
              '        });',
              '      }',
              '    }',
              '  });',
              '}'
            ].join('\n');
            
            mainContent = polyfillLines + '\n' + mainContent;
            fs.writeFileSync(mainPath, mainContent, 'utf8');
            console.log('Bluetooth Classic polyfill successfully injected!');
          }
          "

      - name: Deep Clean Environment
        run: |
          rm -rf node_modules package-lock.json dist android
          find . -name "capacitor.config.ts" -delete
          find . -name "capacitor.config.json" -delete

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Project Dependencies
        run: |
          npm install --force

      - name: Install Capacitor, Plugins & Bluetooth Classic Serial Plugin
        run: |
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest @capacitor/filesystem@latest @capacitor/share@latest cordova-plugin-bluetooth-serial@latest --force

      - name: Build Web Application
        run: npm run build

      - name: Initialize Capacitor Android
        run: |
          npx cap init "Saydali Pro POS" "com.saydalipro.pos" --web-dir=dist
          npx cap add android
          npx cap sync android

      - name: Configure FileProvider and Bluetooth Classic Permissions
        run: |
          mkdir -p android/app/src/main/res/xml
          
          cat << 'EOF' > android/app/src/main/res/xml/file_paths.xml
          <?xml version="1.0" encoding="utf-8"?>
          <paths xmlns:android="http://schemas.android.com/apk/res/android">
              <external-path name="external_files" path="."/>
              <cache-path name="cache_files" path="."/>
              <files-path name="files" path="."/>
          </paths>
          EOF

          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            echo "Configuring AndroidManifest with Bluetooth Classic, Location, and FileProvider..."
            
            PERMISSIONS_BLOCK='    <!-- صلاحيات التخزين والكاميرا -->\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n\n    <!-- صلاحيات البلوتوث الكلاسيكي للأجهزة القديمة والحديثة والموقع -->\n    <uses-permission android:name="android.permission.BLUETOOTH" />\n    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />\n    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />'
            
            sed -i "/<\/manifest>/i $PERMISSIONS_BLOCK" $MANIFEST_PATH
            
            PROVIDER_TAG='<provider android:name="androidx.core.content.FileProvider" android:authorities="${applicationId}.fileprovider" android:exported="false" android:grantUriPermissions="true"><meta-data android:name="android.support.FILE_PROVIDER_PATHS" android:resource="@xml/file_paths" /></provider>'
            sed -i "s|</application>|    $PROVIDER_TAG\n    </application>|" $MANIFEST_PATH
          fi

      - name: Update Kotlin & Gradle Versions for Java 21
        run: |
          cd android
          if [ -f "build.gradle" ]; then
            sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.24"/g' build.gradle
            sed -i 's/kotlin_version = .*/kotlin_version = "1.9.24"/g' build.gradle
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.project.android.useAndroidX=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Saydali-Pro-APK-${{ github.run_id }}-${{ github.run_attempt }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
